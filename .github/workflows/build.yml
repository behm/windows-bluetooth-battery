name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BluetoothBatteryMonitor/BluetoothBatteryMonitor.csproj

      - name: Build
        run: dotnet build BluetoothBatteryMonitor/BluetoothBatteryMonitor.csproj -c Release --no-restore

      - name: Test
        run: >
          dotnet test **/*Tests.csproj
          -c Release
          --no-build
          -- RunConfiguration.TestSessionFilter="!Project~IntegrationTests"