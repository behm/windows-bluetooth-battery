name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (self-contained x64)
        run: >
          dotnet publish BluetoothBatteryMonitor/BluetoothBatteryMonitor.csproj
          -c Release
          -r win-x64
          --self-contained
          -o bin/publish
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: >
          iscc
          /DMyAppVersion=${{ steps.version.outputs.VERSION }}
          installer/BluetoothBatteryMonitor.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Bluetooth Battery Monitor v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            bin/installer/BluetoothBatteryMonitor-Setup-*.exe