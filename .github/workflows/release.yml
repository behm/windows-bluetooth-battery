name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format: '$version'. Expected format: v#.#.# (e.g., v1.2.3)"
            exit 1
          }
          Write-Host "✓ Version format valid: $version"

      - name: Extract version from input
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "FULL_VERSION=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (self-contained x64)
        run: >
          dotnet publish BluetoothBatteryMonitor/BluetoothBatteryMonitor.csproj
          -c Release
          -r win-x64
          --self-contained
          -o bin/publish
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: >
          iscc
          /DMyAppVersion=${{ steps.version.outputs.VERSION }}
          installer/BluetoothBatteryMonitor.iss

      - name: Create and push tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Bluetooth Battery Monitor ${{ inputs.version }}"
          generate_release_notes: true
          files: |
            bin/installer/BluetoothBatteryMonitor-Setup-*.exe